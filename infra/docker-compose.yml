services:
  service-postgres:
    image: postgres:16-alpine
    container_name: service-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - project-network

  service-backend:
    build:
      context: ../backend
      dockerfile: dockerfile
    container_name: service-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "8080:8080"
    networks:
      - project-network
    depends_on:
      service-postgres:
        condition: service_healthy

  # Frontend React (Vite build + Nginx)
  service-frontend:
    build:
      context: ../frontend
      dockerfile: dockerfile
    container_name: service-frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env
    ports:
      - "3000:80"
    networks:
      - project-network
    depends_on:
      - service-backend

volumes:
  postgres_data:

networks:
  project-network:
    driver: bridge